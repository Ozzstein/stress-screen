name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11']
    runs-on: ${{ matrix.os }}
    # Kaleido on Windows runners occasionally hangs; never let a stuck job
    # burn hours of runner time.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run test suite
        run: pytest -q
        env:
          # Golden floats were baselined on macOS/arm64; scipy fits differ
          # slightly per platform. Verdicts are still compared exactly.
          STRESS_SCREEN_GOLDEN_LOOSE: "1"
