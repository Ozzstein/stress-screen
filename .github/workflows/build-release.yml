name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-timeout

      - name: Run test suite
        run: pytest -q
        env:
          # Golden floats were baselined on macOS/arm64; scipy fits differ
          # slightly per platform. Verdicts are still compared exactly.
          STRESS_SCREEN_GOLDEN_LOOSE: "1"

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: stress_screen-windows-x64.exe
            source_name: stress_screen.exe
          - os: macos-latest
            asset_name: stress_screen-macos-arm64
            source_name: stress_screen
          - os: ubuntu-latest
            asset_name: stress_screen-linux-x64
            source_name: stress_screen
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --clean --noconfirm stress_screen.spec

      - name: Smoke-test binary (--help)
        shell: bash
        run: ./dist/${{ matrix.source_name }} --help

      # Full end-to-end smoke test: run the frozen binary on a synthetic pack
      # and require the verdict lines, HTML+PDF reports (catches missing
      # Kaleido bundling), and the JSON result to all materialize.
      - name: Smoke-test binary (end-to-end)
        shell: bash
        run: |
          python -c "from tests.synth import make_synthetic_csv; from pathlib import Path; print(make_synthetic_csv(Path('smoke')))"
          ./dist/${{ matrix.source_name }} smoke/SynthPack_D01032026_080000_M2.csv --out-dir smoke-out --full && rc=$? || rc=$?
          echo "exit code: $rc"
          test "$rc" -eq 0 -o "$rc" -eq 1
          ls -la smoke-out/
          test -s smoke-out/SynthPack_D01032026_080000_M2_report.html
          test -s smoke-out/SynthPack_D01032026_080000_M2_report.pdf
          test -s smoke-out/SynthPack_D01032026_080000_M2_result.json

      - name: Rename binary for release
        shell: bash
        run: mv dist/${{ matrix.source_name }} dist/${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded assets
        run: ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
