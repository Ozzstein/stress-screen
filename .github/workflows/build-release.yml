name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: stress_screen-windows-x64.exe
            source_name: stress_screen.exe
          - os: macos-latest
            asset_name: stress_screen-macos-arm64
            source_name: stress_screen
          - os: ubuntu-latest
            asset_name: stress_screen-linux-x64
            source_name: stress_screen
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --clean --noconfirm stress_screen.spec

      - name: Smoke-test binary (--help)
        shell: bash
        run: ./dist/${{ matrix.source_name }} --help

      - name: Rename binary for release
        shell: bash
        run: mv dist/${{ matrix.source_name }} dist/${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded assets
        run: ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
